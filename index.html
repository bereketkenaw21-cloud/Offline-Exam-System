<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Mariyam Exam</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #1e1e3f 0%, #111122 100%);
            --card-bg: rgba(255, 255, 255, 0.1);
            --btn-blue: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            --btn-purple: linear-gradient(90deg, #9d50bb 0%, #6e48aa 100%);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hidden { display: none !important; }

        header {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin-top: 50px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h2 { font-size: 1.5rem; margin-bottom: 20px; color: #00d2ff; }

        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: block;
            text-decoration: none;
        }

        .btn-blue { background: var(--btn-blue); }
        .btn-purple { background: var(--btn-purple); }
        .btn-gray { background: #555; }

        .logo-img { width: 80px; margin-bottom: 20px; }

        /* Exam Page UI */
        .q-card { text-align: left; margin-top: 20px; }
        .option {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .option.selected { border: 2px solid #00d2ff; background: rgba(0,210,255,0.1); }
    </style>
</head>
<body>

    <header>
        <span style="font-weight: bold;">Mertule Mariyam Exam</span>
        <div id="timer-display" class="hidden" style="background:red; padding:2px 8px; border-radius:5px;">60:00</div>
    </header>

    <div id="welcome-page" class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/3534/3534033.png" class="logo-img" alt="logo">
        <h2 style="color: #fff;">እንኳን ወደ መርጡለ ማሪያም 2ኛ ደረጃ ትምህርት ቤት የተማሪወች የፈተና መለማመጃ ሲስተም በደህና መጣቹህ!</h2>
        <p style="color: #ffeb3b;">አዘጋጅ፦ በረከት ቀናው</p>
        <button class="btn btn-blue" onclick="showPage('role-page')">ጀምር</button>
    </div>

    <div id="role-page" class="container hidden">
        <h2>ማን ነዎት?</h2>
        <button class="btn btn-blue" onclick="showPage('stream-page')">ተማሪ (Student)</button>
        <button class="btn btn-blue" onclick="promptAdmin()">አድሚን (Admin)</button>
        <button class="btn btn-gray" onclick="showPage('welcome-page')">ወደ ኋላ</button>
    </div>

    <div id="stream-page" class="container hidden">
        <h2>ዘርፍ ይምረጡ</h2>
        <button class="btn btn-blue" onclick="loadSubjects('Social')">Social Science</button>
        <button class="btn btn-blue" onclick="loadSubjects('Natural')">Natural Science</button>
        <button class="btn btn-gray" onclick="showPage('role-page')">ወደ ኋላ</button>
    </div>

    <div id="subject-page" class="container hidden">
        <h2>ትምህርት ይምረጡ</h2>
        <div id="subject-list"></div>
        <button class="btn btn-gray" onclick="showPage('stream-page')">ወደ ኋላ</button>
    </div>

    <div id="exam-page" class="container hidden" style="max-width: 600px;">
        <div class="q-card">
            <h4 id="q-text"></h4>
            <div id="options-list"></div>
        </div>
        <button class="btn btn-blue" onclick="nextQ()">ቀጣይ (Next)</button>
        <button class="btn btn-purple" onclick="finishExam()">ጨርስ (Submit)</button>
    </div>

    <div id="admin-page" class="container hidden">
        <h2>Admin Panel</h2>
        <select id="adm-stream" class="btn btn-gray" style="background:#333">
            <option value="Natural">Natural</option>
            <option value="Social">Social</option>
        </select>
        <input type="text" id="adm-sub" placeholder="የሳብጀክት ስም (ምሳሌ፡ English)" class="btn" style="background:#333; border:1px solid #555">
        <textarea id="bulk-input" class="btn" style="height:100px; background:#000; text-align:left;" placeholder="ጥያቄዎችን እዚህ ይለጥፉ..."></textarea>
        <button class="btn btn-blue" onclick="saveQuestions()">ጥያቄዎቹን ጫን</button>
        <button class="btn btn-gray" onclick="location.reload()">ውጣ</button>
    </div>

    <script>
        let currentQs = [], curIdx = 0, answers = [], timer;

        function showPage(id) {
            document.querySelectorAll('.container').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function promptAdmin() {
            if(prompt("Password:") === "Mertule Mariyam@2026") showPage('admin-page');
        }

        function loadSubjects(stream) {
            showPage('subject-page');
            let data = JSON.parse(localStorage.getItem('exams') || "{}")[stream] || {};
            let list = document.getElementById('subject-list');
            list.innerHTML = "";
            
            Object.keys(data).forEach(sub => {
                let b = document.createElement('button');
                b.className = "btn btn-blue";
                b.innerText = sub;
                b.onclick = () => startExam(data[sub]);
                list.appendChild(b);
            });
            if(Object.keys(data).length === 0) list.innerHTML = "<p>ምንም ፈተና የለም</p>";
        }

        function startExam(qs) {
            currentQs = qs; curIdx = 0; answers = new Array(qs.length).fill(null);
            showPage('exam-page');
            document.getElementById('timer-display').classList.remove('hidden');
            renderQ();
        }

        function renderQ() {
            let q = currentQs[curIdx];
            document.getElementById('q-text').innerText = (curIdx+1) + ". " + q.text;
            let html = "";
            ['A','B','C','D'].forEach(l => {
                html += `<div class="option ${answers[curIdx]===l?'selected':''}" onclick="answers[${curIdx}]='${l}';renderQ()">${l}. ${q[l]}</div>`;
            });
            document.getElementById('options-list').innerHTML = html;
        }

        function nextQ() { if(curIdx < currentQs.length-1) { curIdx++; renderQ(); } }

        function saveQuestions() {
            let stream = document.getElementById('adm-stream').value;
            let sub = document.getElementById('adm-sub').value;
            let text = document.getElementById('bulk-input').value;
            if(!sub || !text) return alert("ሁሉንም ይሙሉ!");

            let raw = text.split(/\d+\./).filter(q => q.trim().length > 5);
            let parsed = raw.map(q => {
                let p = q.split(/[A-D]\./);
                return { text:p[0].trim(), A:p[1]?.trim(), B:p[2]?.trim(), C:p[3]?.trim(), D:p[4]?.trim(), ans:"A" };
            });

            let data = JSON.parse(localStorage.getItem('exams') || "{}");
            if(!data[stream]) data[stream] = {};
            data[stream][sub] = parsed;
            localStorage.setItem('exams', JSON.stringify(data));
            alert("ተሳክቷል!"); location.reload();
        }

        function finishExam() { alert("ፈተናው ተጠናቋል!"); location.reload(); }

        // PWA Registration
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
