<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Mariyam Exam Prep 2026</title>

    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        :root { --accent: #00d2ff; --purple: #9b59b6; --dark: #0f0c29; }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            color: white; height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 85%; max-width: 450px;
            max-height: 90vh; overflow-y: auto; text-align: center;
        }
        .hidden { display: none !important; }
        button {
            background: linear-gradient(to right, #00d2ff, #3a7bd5); color: white;
            border: none; padding: 14px; border-radius: 50px; font-size: 1rem;
            cursor: pointer; margin: 8px 0; width: 100%; font-weight: bold; transition: 0.3s;
        }
        button:active { transform: scale(0.95); }
        .option-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px; padding: 12px; margin: 6px 0; width: 100%; text-align: left; color: white;
        }
        .option-btn.selected { background: var(--accent); color: black; border-color: white; }
        input, select, textarea {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: none; 
            background: rgba(255,255,255,0.1); color: white; box-sizing: border-box;
        }
        #timer { font-size: 2.2rem; color: #ff4b2b; font-weight: bold; margin-bottom: 10px; }
        #install-prompt {
            position: fixed; bottom: 20px; background: #27ae60; width: auto; 
            padding: 10px 20px; left: 50%; transform: translateX(-50%); z-index: 100;
        }
    </style>
</head>
<body>

    <button id="install-prompt" class="hidden">አፑን ስልክዎ ላይ ይጫኑ (Install)</button>

    <div id="splash" class="container">
        <div style="font-size: 80px;">🎓</div>
        <h1 style="color: var(--accent);">መርጡለ ማሪያም 2ኛ ደረጃ ትምህርት ቤት</h1>
        <p style="font-weight: bold; color: #ffd700;">ፈተና መለማመጃ ሲስተም</p>
        <p>አዘጋጅ፦ በረከት ቀናው</p>
    </div>

    <div id="main-menu" class="container hidden">
        <h2 style="color: var(--accent);">ዋና ማውጫ</h2>
        <button onclick="showScreen('role-page')">ጀምር / Start</button>
        <button onclick="startQRScanner()" style="background: var(--purple);">በ QR ጥያቄ ተቀበል</button>
    </div>

    <div id="role-page" class="container hidden">
        <h2>ማን ነዎት?</h2>
        <button onclick="showScreen('stream-page'); userRole='student'">ተማሪ (Student)</button>
        <button onclick="adminLogin()">አድሚን (Admin)</button>
        <button onclick="showScreen('main-menu')" style="background: #636e72;">ተመለስ</button>
    </div>

    <div id="stream-page" class="container hidden">
        <h2>ዘርፍ ይምረጡ</h2>
        <button onclick="loadSubjects('Natural')">Natural Science</button>
        <button onclick="loadSubjects('Social')">Social Science</button>
    </div>

    <div id="subject-page" class="container hidden">
        <h2 id="sub-title">ትምህርቶች</h2>
        <div id="subject-list"></div>
        <button onclick="showScreen('stream-page')" style="background: #636e72;">ተመለስ</button>
    </div>

    <div id="admin-page" class="container hidden">
        <h2 id="adm-sub-display">ጥያቄ መጫኛ</h2>
        <input type="file" id="camera-ocr" accept="image/*" capture="environment" class="hidden" onchange="doOCR(this)">
        <button onclick="document.getElementById('camera-ocr').click()" style="background: #e67e22;">ፎቶ አንሳ (OCR)</button>
        <textarea id="q-input" placeholder="ጥያቄው..."></textarea>
        <input type="text" id="ansA" placeholder="ምርጫ A">
        <input type="text" id="ansB" placeholder="ምርጫ B">
        <input type="text" id="ansC" placeholder="ምርጫ C">
        <input type="text" id="ansD" placeholder="ምርጫ D">
        <select id="correct-ans">
            <option value="">ትክክለኛ መልስ ይምረጡ</option>
            <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
        </select>
        <button onclick="saveQuestion()" style="background: #27ae60;">መዝግብ</button>
        <button onclick="showQR()" style="background: var(--purple);">ለተማሪዎች QR አውጣ</button>
        <div id="qr-out" style="background: white; padding: 10px; margin-top: 10px;" class="hidden"></div>
        <button onclick="showScreen('main-menu')" style="background: #636e72;">ውጣ</button>
    </div>

    <div id="exam-page" class="container hidden">
        <div id="timer">60:00</div>
        <div id="q-text" style="text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px;"></div>
        <div id="options-box" style="margin-top: 15px;"></div>
        <div style="display: flex; gap: 10px;">
            <button onclick="prevQ()" style="background: #e67e22;">Back</button>
            <button onclick="nextQ()">Next</button>
        </div>
        <button id="finish-btn" onclick="endExam()" class="hidden" style="background: #27ae60;">ፈተናውን ጨርስ</button>
    </div>

    <div id="qr-scan-page" class="container hidden">
        <div id="reader" style="width: 100%;"></div>
        <button onclick="stopScan()">ተመለስ</button>
    </div>

    <div id="result-page" class="container hidden">
        <h1>ውጤትዎ</h1>
        <h2 id="score-display" style="font-size: 3rem; color: #ffd700;"></h2>
        <button onclick="location.reload()">ወደ ዋና ገጽ</button>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('mmDB')) || { Natural: {}, Social: {} };
        let currentQs = [], curIdx = 0, answers = [], timer, timeLeft = 3600, activeSub = "", activeStream = "", userRole = "";
        let scanner;

        // Start
        setTimeout(() => showScreen('main-menu'), 3000);

        function showScreen(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function adminLogin() {
            if(prompt("Password:") === "Mertule Mariyam@2026") { userRole = 'admin'; showScreen('stream-page'); }
        }

        function loadSubjects(stream) {
            activeStream = stream;
            showScreen('subject-page');
            document.getElementById('sub-title').innerText = stream + " Subjects";
            const subs = stream === 'Natural' ? ["Biology", "Chemistry", "Physics", "Maths", "English"] : ["History", "Geography", "Economics", "Maths", "English"];
            let list = document.getElementById('subject-list');
            list.innerHTML = "";
            subs.forEach(s => {
                let b = document.createElement('button');
                b.innerText = s;
                b.onclick = () => {
                    activeSub = s;
                    if(userRole === 'admin') { showScreen('admin-page'); document.getElementById('adm-sub-display').innerText = s + " - Admin"; }
                    else { startExam(s); }
                };
                list.appendChild(b);
            });
        }

        // Exam Engine
        function startExam(sub) {
            currentQs = db[activeStream][sub] || [];
            if(currentQs.length === 0) return alert("ጥያቄ አልተጫነም!");
            curIdx = 0; answers = new Array(currentQs.length).fill(null);
            showScreen('exam-page');
            renderQ();
            timeLeft = 3600;
            timer = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
                if(timeLeft <= 0) endExam();
            }, 1000);
        }

        function renderQ() {
            let q = currentQs[curIdx];
            document.getElementById('q-text').innerText = (curIdx+1) + ". " + q.text;
            let box = document.getElementById('options-box'); box.innerHTML = "";
            ['A','B','C','D'].forEach(l => {
                let b = document.createElement('div');
                b.className = "option-btn" + (answers[curIdx] === l ? " selected" : "");
                b.innerText = l + ". " + q[l];
                b.onclick = () => { answers[curIdx] = l; renderQ(); };
                box.appendChild(b);
            });
            document.getElementById('finish-btn').classList.toggle('hidden', curIdx !== currentQs.length-1);
        }

        function nextQ() { if(curIdx < currentQs.length-1) { curIdx++; renderQ(); } }
        function prevQ() { if(curIdx > 0) { curIdx--; renderQ(); } }

        function endExam() {
            clearInterval(timer);
            let score = 0;
            currentQs.forEach((q, i) => { if(answers[i] === q.correct) score++; });
            showScreen('result-page');
            document.getElementById('score-display').innerText = score + " / " + currentQs.length;
        }

        // Admin OCR & Save
        async function doOCR(input) {
            const result = await Tesseract.recognize(input.files[0], 'eng');
            document.getElementById('q-input').value = result.data.text;
        }

        function saveQuestion() {
            let q = {
                text: document.getElementById('q-input').value,
                A: document.getElementById('ansA').value, B: document.getElementById('ansB').value,
                C: document.getElementById('ansC').value, D: document.getElementById('ansD').value,
                correct: document.getElementById('correct-ans').value
            };
            if(!db[activeStream][activeSub]) db[activeStream][activeSub] = [];
            db[activeStream][activeSub].push(q);
            localStorage.setItem('mmDB', JSON.stringify(db));
            alert("ተመዝግቧል!");
            document.querySelectorAll('#admin-page input, #admin-page textarea').forEach(i => i.value = "");
        }

        function showQR() {
            let out = document.getElementById('qr-out'); out.classList.remove('hidden'); out.innerHTML = "";
            new QRCode(out, { text: JSON.stringify({s: activeStream, b: activeSub, q: db[activeStream][activeSub]}), width: 200, height: 200 });
        }

        // QR Scanner
        function startQRScanner() {
            showScreen('qr-scan-page');
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                let data = JSON.parse(txt);
                db[data.s][data.b] = data.q;
                localStorage.setItem('mmDB', JSON.stringify(db));
                alert("ጥያቄዎች ደርሰውናል!");
                stopScan();
            });
        }
        function stopScan() { scanner.stop().then(() => showScreen('main-menu')); }

        // 100000% Install Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('install-prompt').classList.remove('hidden');
        });
        document.getElementById('install-prompt').addEventListener('click', () => {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
                if (choice.outcome === 'accepted') document.getElementById('install-prompt').classList.add('hidden');
            });
        });
    </script>
</body>
</html>
