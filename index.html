<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Mariyam Exam System 2026</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #1a1a2e; --secondary: #16213e; --accent: #e94560; --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--primary); color: var(--text); overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Splash Screen */
        #splash { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle, #16213e, #1a1a2e); position: fixed; width: 100%; z-index: 1000; transition: 0.8s; }
        .logo { font-size: 80px; margin-bottom: 20px; }

        /* General Layout */
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; background: var(--secondary); color: white; font-size: 1.1rem; cursor: pointer; border: 1px solid #0f3460; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .accent-btn { background: var(--accent); }

        /* Question Box */
        .q-card { background: #0f3460; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .option { display: block; background: #1a1a2e; padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; border: 1px solid #16213e; }
        .option.selected { border: 2px solid var(--accent); background: #16213e; }

        textarea { width: 100%; height: 150px; background: #1a1a2e; color: white; border-radius: 10px; padding: 10px; margin-bottom: 10px; border: 1px solid var(--accent); }
        #ocr-status { color: #ffc107; font-size: 0.8rem; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo">🎓</div>
        <h2>እንኳን ወደ መርጡለ ማሪያም 2ኛ ደረጃ ትምህርት ቤት የተማሪወች የፈተና መለማመጃ ሲስተም በደህና መጣቹህ</h2>
        <p style="color: #00d2ff;">አዘጋጅ፦ በረከት ቀናው</p>
    </div>

    <div id="app" class="hidden">
        <header style="display: flex; justify-content: space-between; padding: 10px; background: var(--secondary);">
            <div onclick="toggleLang()" style="cursor:pointer;">አማርኛ / EN</div>
            <div id="timer" class="hidden">60:00</div>
        </header>

        <div class="container">
            <div id="entry-page">
                <button class="btn accent-btn" onclick="showRoles()">Start</button>
            </div>

            <div id="role-page" class="hidden">
                <button class="btn" onclick="showStudentStream()">የተማሪዎች መግቢያ</button>
                <button class="btn" onclick="promptAdmin()">የAdmin መግቢያ</button>
            </div>

            <div id="stream-page" class="hidden">
                <button class="btn" onclick="loadSubjects('Social')">Social (ሶሻል)</button>
                <button class="btn" onclick="loadSubjects('Natural')">Natural (ናቹራል)</button>
            </div>
            <div id="subject-page" class="hidden">
                <h3 id="stream-title"></h3>
                <div id="subject-list"></div>
            </div>

            <div id="exam-page" class="hidden">
                <div class="q-card">
                    <h4 id="q-text"></h4>
                    <div id="options-list"></div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" onclick="prevQ()">Back</button>
                    <button class="btn accent-btn" onclick="nextQ()">Next</button>
                </div>
                <button class="btn" style="background: green;" onclick="finishExam()">Submit</button>
            </div>

            <div id="result-page" class="hidden">
                <h2>ውጤት</h2>
                <h1 id="score-display"></h1>
                <button class="btn" onclick="location.reload()">ተመለስ</button>
            </div>

            <div id="admin-page" class="hidden">
                <h3>Admin Control Panel</h3>
                <select id="admin-stream" class="btn">
                    <option value="Natural">Natural</option>
                    <option value="Social">Social</option>
                </select>
                <input type="text" id="admin-sub" placeholder="Subject Name" class="btn">
                
                <div id="ocr-status"></div>
                <textarea id="bulk-input" placeholder="ጥያቄዎችን እዚህ ይለጥፉ ወይም ፎቶ አንሱ..."></textarea>
                
                <div style="display: flex; gap: 5px;">
                    <button class="btn" style="background:#28a745" onclick="openCamera()">📷 Camera</button>
                    <input type="file" id="file-input" accept="image/*" onchange="processFile(event)" class="hidden">
                    <button class="btn" style="background:#17a2b8" onclick="document.getElementById('file-input').click()">🖼️ Gallery</button>
                </div>
                
                <button class="btn accent-btn" onclick="saveQuestions()">ጥያቄዎችን ጫን (Upload)</button>
                <button class="btn" onclick="location.reload()">ውጣ</button>
            </div>
        </div>
    </div>

    <script>
        let currentQuestions = [], currentIndex = 0, userAnswers = [], timer, timeRemaining = 3600;

        // Splash
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            }, 800);
        }, 5000);

        function showRoles() { hideAll(); document.getElementById('role-page').classList.remove('hidden'); }
        function showStudentStream() { hideAll(); document.getElementById('stream-page').classList.remove('hidden'); }
        
        function promptAdmin() {
            if(prompt("Admin Password:") === "Mertule Mariyam@2026") {
                hideAll(); document.getElementById('admin-page').classList.remove('hidden');
            } else alert("Error!");
        }

        // Camera & OCR Logic
        async function processPhoto(src) {
            const status = document.getElementById('ocr-status');
            status.innerText = "Processing image... please wait...";
            try {
                const worker = await Tesseract.createWorker('eng');
                const { data: { text } } = await worker.recognize(src);
                document.getElementById('bulk-input').value = text;
                status.innerText = "Done! Review and edit the questions below.";
                await worker.terminate();
            } catch (e) { status.innerText = "OCR Error!"; }
        }

        function processFile(e) {
            const reader = new FileReader();
            reader.onload = (f) => processPhoto(f.target.result);
            reader.readAsDataURL(e.target.files[0]);
        }
        function openCamera() {
            document.getElementById('file-input').setAttribute('capture', 'camera');
            document.getElementById('file-input').click();
        }

        // Smart Question Parsing & Save
        function saveQuestions() {
            let stream = document.getElementById('admin-stream').value;
            let sub = document.getElementById('admin-sub').value;
            let text = document.getElementById('bulk-input').value;
            
            // Smart Parsing: Splits by number (e.g., 1., 2.)
            let rawQs = text.split(/\d+\./).filter(q => q.trim().length > 5);
            let parsed = rawQs.map(q => {
                let parts = q.split(/[A-D]\./);
                return {
                    text: parts[0].trim(),
                    A: parts[1]?.trim() || "Option A",
                    B: parts[2]?.trim() || "Option B",
                    C: parts[3]?.trim() || "Option C",
                    D: parts[4]?.trim() || "Option D",
                    ans: "A" // Default answer
                };
            });

            let data = JSON.parse(localStorage.getItem('exams') || "{}");
            if(!data[stream]) data[stream] = {};
            data[stream][sub] = parsed;
            localStorage.setItem('exams', JSON.stringify(data));
            alert(parsed.length + " Questions Saved!");
            location.reload();
        }

        // Subject & Exam Logic
        function loadSubjects(stream) {
            hideAll();
            document.getElementById('subject-page').classList.remove('hidden');
            let data = JSON.parse(localStorage.getItem('exams') || "{}")[stream];
            let list = document.getElementById('subject-list');
            list.innerHTML = data ? "" : "ምንም ጥያቄ የለም";
            if(data) Object.keys(data).forEach(s => {
                let b = document.createElement('button');
                b.className="btn"; b.innerText=s; b.onclick=()=>startExam(data[s]);
                list.appendChild(b);
            });
        }

        function startExam(qs) {
            currentQuestions = qs; currentIndex = 0; userAnswers = new Array(qs.length).fill(null);
            hideAll(); document.getElementById('exam-page').classList.remove('hidden');
            document.getElementById('timer').classList.remove('hidden');
            renderQuestion(); startTimer();
        }

        function renderQuestion() {
            let q = currentQuestions[currentIndex];
            document.getElementById('q-text').innerText = (currentIndex+1) + ". " + q.text;
            let opts = document.getElementById('options-list'); opts.innerHTML = "";
            ['A','B','C','D'].forEach(l => {
                let d = document.createElement('div');
                d.className = "option " + (userAnswers[currentIndex] === l ? "selected" : "");
                d.innerText = l + ". " + q[l];
                d.onclick = () => { userAnswers[currentIndex] = l; renderQuestion(); };
                opts.appendChild(d);
            });
        }

        function nextQ() { 
            if(!userAnswers[currentIndex]) return alert("መልስ ይምረጡ!");
            if(currentIndex < currentQuestions.length-1) { currentIndex++; renderQuestion(); } 
        }
        function prevQ() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }

        function startTimer() {
            timer = setInterval(() => {
                timeRemaining--;
                let m = Math.floor(timeRemaining/60), s = timeRemaining % 60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
                if(timeRemaining <= 0) finishExam();
            }, 1000);
        }

        function finishExam() {
            clearInterval(timer); hideAll();
            document.getElementById('result-page').classList.remove('hidden');
            let score = 0;
            currentQuestions.forEach((q, i) => { if(userAnswers[i] === q.ans) score++; });
            document.getElementById('score-display').innerText = score + " / " + currentQuestions.length;
        }

        function hideAll() {
            ['role-page','stream-page','subject-page','exam-page','result-page','admin-page','entry-page'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
        }
        function toggleLang() { alert("ቋንቋ መቀየሪያ በቅርብ ቀን..."); }
    </script>
</body>
</html>
